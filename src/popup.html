<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Laracasts CC</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <p class="kicker">Laracasts CC</p>
        <h1>Subtitle viewer</h1>
      </header>

      <section class="settings">
        <label class="field">
          <span>OpenAI API key</span>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false">
        </label>

        <label class="field">
          <span>Translate to</span>
          <input id="targetLang" type="text" placeholder="Português" spellcheck="false">
        </label>

        <label class="field">
          <span>Subtitle mode</span>
          <select id="mode">
            <option value="original">Original (English)</option>
            <option value="translated">Translated only</option>
            <option value="dual">Dual (English + translation)</option>
          </select>
        </label>

        <label class="field">
          <span>Model</span>
          <select id="model">
            <option value="gpt-4o-mini">gpt-4o-mini (cheap, fast)</option>
            <option value="gpt-4o">gpt-4o (better quality)</option>
          </select>
        </label>

        <label class="field">
          <span>Subtitle size</span>
          <select id="fontSize">
            <option value="0.85">Small</option>
            <option value="1">Medium</option>
            <option value="1.3">Large</option>
            <option value="1.6">Extra large</option>
          </select>
        </label>

        <label class="field field-check">
          <input id="autoPause" type="checkbox">
          <span>Pause on each subtitle (study mode)</span>
        </label>
      </section>

      <div class="actions">
        <button id="overlay" class="primary" type="button">Show subtitle on video</button>
        <button id="chat" type="button">Chat about this video</button>
        <button id="download" type="button">Download subtitle (.srt)</button>
        <button id="login" type="button">Login on Laracasts</button>
        <button id="open" type="button">Open Laracasts</button>
      </div>

      <p id="status" class="status">Set your key, pick a mode, then turn the subtitle on.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
