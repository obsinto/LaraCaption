<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LaraCaption</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <p class="kicker">Learn English with Laracasts</p>
        <h1>LaraCaption</h1>
      </header>

      <div class="actions">
        <button id="overlay" class="primary" type="button">Show subtitle on video</button>
        <button id="chat" type="button">Chat about this video</button>
        <div class="actions-row">
          <button id="continue" type="button">▶ Continue</button>
          <button id="download" type="button">↓ .srt</button>
        </div>
      </div>

      <details class="settings-box" id="settingsBox">
        <summary>
          <span class="gear">⚙</span> Settings
          <span class="chev" aria-hidden="true">▾</span>
        </summary>

        <section class="settings">
          <label class="field">
            <span>OpenAI API key</span>
            <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" spellcheck="false">
          </label>

          <div class="field-grid">
            <label class="field">
              <span>Mode</span>
              <select id="mode">
                <option value="original">Original</option>
                <option value="translated">Translated</option>
                <option value="dual">Dual</option>
              </select>
            </label>

            <label class="field">
              <span>Size</span>
              <select id="fontSize">
                <option value="0.85">Small</option>
                <option value="1">Medium</option>
                <option value="1.3">Large</option>
                <option value="1.6">X-large</option>
              </select>
            </label>
          </div>

          <div class="field-grid">
            <label class="field">
              <span>Translate to</span>
              <input id="targetLang" type="text" placeholder="Português" spellcheck="false">
            </label>

            <label class="field">
              <span>Model</span>
              <select id="model">
                <option value="gpt-4o-mini">gpt-4o-mini</option>
                <option value="gpt-4o">gpt-4o</option>
              </select>
            </label>
          </div>

          <label class="field field-check">
            <input id="autoPause" type="checkbox">
            <span>Pause on each subtitle (study mode)</span>
          </label>
        </section>
      </details>

      <p id="status" class="status">Pick a mode, then turn the subtitle on.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
